version: '3.8'

services:
  agentern_api:
    build: .
    ports:
      - "17111:8000"
    volumes:
      - ./chroma_data:/app/chroma_data
    environment:
      # Use host.docker.internal to route back to local hardware Ollama
      - OLLAMA_URL=http://172.17.0.1:11434/api/generate
    networks:
      - agentern_net

networks:
  agentern_net:
    driver: bridge
